<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Bar - Área do Administrador</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #212529; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; }
        h2 { text-align: center; margin-bottom: 24px; color: #343a40; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #495057; font-weight: bold; }
        input { width: 100%; padding: 10px; border: 1px solid #ced4da; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #ffc107; border: none; color: #212529; font-weight: bold; font-size: 1rem; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #e0a800; }
        #mensagem { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Painel do Bar 🍺</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Telefone do Bar</label>
                <input type="text" id="telefone" placeholder="Ex: 61988887777" required>
            </div>
            <div class="form-group">
                <label>Senha administrativa</label>
                <input type="password" id="senha" placeholder="Sua senha secreta" required>
            </div>
            <button type="submit">Entrar no Painel</button>
        </form>
        <div id="mensagem"></div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const telefone = document.getElementById('telefone').value;
            const senhaAdmin = document.getElementById('senha').value;
            const msgElement = document.getElementById('mensagem');

            // Aqui você fará a chamada para a rota de login da sua API
            // Por enquanto, vamos simular a validação com os dados que você enviou
            try {
                // Exemplo de teste local ou online:
                const response = await fetch('/api/bares/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telefone, senhaAdmin })
                });

                if (response.ok) {
                    msgElement.style.color = 'green';
                    msgElement.innerText = 'Login efetuado com sucesso! Entrando...';
                    // Aqui você redirecionaria o gerente para o painel de criar promoções
                } else {
                    msgElement.style.color = 'red';
                    msgElement.innerText = 'Telefone ou Senha incorretos!';
                }
            } catch (error) {
                msgElement.style.color = 'red';
                msgElement.innerText = 'Erro ao conectar com o servidor.';
            }
        });
    </script>
</body>
</html>
