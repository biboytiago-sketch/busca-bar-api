<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Bar - Lista de Bares</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        header { text-align: center; margin-bottom: 30px; background: #343a40; color: white; padding: 20px; border-radius: 8px; }
        .container { max-width: 800px; margin: 0 auto; }
        .bar-card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #ffc107; }
        .bar-name { margin: 0 0 10px 0; font-size: 1.4rem; color: #212529; }
        .bar-info { margin: 5px 0; color: #6c757d; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🍻 Busca Bar</h1>
            <p>Encontre os melhores bares e promoções da região</p>
        </header>

        <main id="lista-bares">
            <p style="text-align: center;">Carregando bares parceiros...</p>
        </main>
    </div>

    <script>
        // Busca os bares cadastrados na API automaticamente ao carregar a página
        async function carregarBares() {
            try {
                const response = await fetch('/api/bares');
                const bares = await response.json();
                const container = document.getElementById('lista-bares');
                
                if (bares.length === 0) {
                    container.innerHTML = '<p style="text-align: center;">Nenhum bar cadastrado no momento. 🏖️</p>';
                    return;
                }

                container.innerHTML = '';
                bares.forEach(bar => {
                    container.innerHTML += `
                        <div class="bar-card">
                            <h2 class="bar-name">${bar.nome}</h2>
                            <p class="bar-info">📍 <strong>Endereço:</strong> ${bar.endereco}</p>
                            <p class="bar-info">📞 <strong>Telefone:</strong> ${bar.telefone}</p>
                        </div>
                    `;
                });
            } catch (error) {
                document.getElementById('lista-bares').innerHTML = '<p style="text-align: center; color: red;">Erro ao carregar os bares.</p>';
            }
        }

        carregarBares();
    </script>
</body>
</html>
